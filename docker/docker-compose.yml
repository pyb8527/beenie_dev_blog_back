services:
  mysql:
    image: mysql:8.0
    container_name: backend-init-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: backend_init
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: backend-init-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: backend-init-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mysql-data:
